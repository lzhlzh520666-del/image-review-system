<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 营销合规审核系统 · V1 高保真原型</title>
<style>
/* ═════════════════════════════════════════
   视觉系统 — 企业蓝白表格风 B 端后台风
   ═════════════════════════════════════════ */
:root {
  --bg: #F0F2F5;
  --white: #FFFFFF;
  --surface: #FFFFFF;
  --text-1: #1F1F1F;
  --primary-50: #F0F6FF;
  --primary: #1677FF;
  --primary-hover: #4096FF;
  --primary-light: #E6F4FF;
  --success: #52C41A;
  --success-bg: #F6FFED;
  --danger: #F5222D;
  --danger-bg: #FFF2F0;
  --warning: #FAAD14;
  --warning-bg: #FFFBE6;
  --text-primary: #262626;
  --text-secondary: #595959;
  --text-muted: #8C8C8C;
  --border: #E4E7EC;
  --border-light: #F0F0F0;
  --table-header-bg: #FAFAFA;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
  --shadow-card: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-hover: 0 8px 20px rgba(22,119,255,.10), 0 2px 6px rgba(0,0,0,.06);
  --shadow-pop: 0 8px 28px rgba(0,0,0,.12);
  --radius: 6px;
  --radius-lg: 10px;
  --sidebar-w: 200px;
  --header-h: 56px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; font-size: 14px; color: var(--text-primary); background: var(--bg); line-height: 1.5715; }

/* ── 通用工具类 & 卡片抬升 ── */
.page-wrap { max-width:1440px; margin:0 auto; }
.page-title { font-size:18px; font-weight:600; color:var(--text-1); letter-spacing:.2px; margin:0 0 16px; }

/* 卡片抬升 */
.kpi-card, .chart-card, .config-section, .rule-tree, .review-queue, .review-panel, .data-table { box-shadow:var(--shadow-card); transition:box-shadow .25s ease, transform .25s ease; }
.kpi-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-hover); }
.chart-card:hover, .config-section:hover, .rule-tree:hover { box-shadow:var(--shadow-hover); }
.data-table th { letter-spacing:.3px; }

/* Dashboard 图表 */
.chart-svg { width:100%; height:200px; display:block; }
.donut-wrap { display:flex; flex-direction:column; align-items:center; gap:14px; padding-top:4px; }
.donut { width:132px; height:132px; border-radius:50%; position:relative; background:conic-gradient(var(--success) 0 78%, var(--danger) 78% 90%, var(--warning) 90% 100%); }
.donut::after { content:''; position:absolute; inset:24px; background:var(--white); border-radius:50%; }
.donut-legend { font-size:13px; width:100%; }
.donut-legend .lg { display:flex; align-items:center; justify-content:space-between; padding:3px 2px; }
.donut-legend .lg-l { display:flex; align-items:center; gap:8px; color:var(--text-secondary); }
.legend-dot { width:9px; height:9px; border-radius:3px; flex-shrink:0; }
.bar-row { display:flex; align-items:center; gap:10px; margin-bottom:12px; font-size:13px; }
.bar-label { width:42px; color:var(--text-secondary); flex-shrink:0; }
.bar-track { flex:1; height:9px; background:#F0F0F0; border-radius:5px; overflow:hidden; }
.bar-fill { height:100%; border-radius:5px; background:linear-gradient(90deg,#1677FF,#4096FF); }
.bar-val { width:50px; text-align:right; font-weight:600; color:var(--text-1); flex-shrink:0; }

/* ── 导航系统 ── */
.app-layout { display:flex; height:100vh; overflow:hidden; }
.sidebar { width:var(--sidebar-w); background:var(--primary); color:#fff; display:flex; flex-direction:column; flex-shrink:0; }
.sidebar-logo { padding:16px 20px; font-size:16px; font-weight:600; border-bottom:rgba(255,255,255,.15); white-space:nowrap; letter-spacing:.5px; }
.sidebar-logo span { opacity:.85; font-size:12px; font-weight:400; margin-left:6px; }
.sidebar-nav { flex:1; padding:8px 0; overflow-y:auto; }
.nav-group { margin-bottom:4px; }
.nav-label { padding:10px 20px 6px; font-size:12px; color:rgba(255,255,255,.45); text-transform:uppercase; letter-spacing:1px; cursor:default; }
.nav-item { display:flex; align-items:center; padding:10px 20px; color:rgba(255,255,255,.75); cursor:pointer; transition:all .2s; border-left:3px solid transparent; gap:8px; font-size:13px; }
.nav-item:hover { background:rgba(255,255,255,.1); color:#fff; }
.nav-item.active { background:rgba(255,255,255,.18); color:#fff; border-left-color:#fff; font-weight:500; }
.nav-icon { width:16px; height:16px; flex-shrink:0; opacity:.8; }

.main-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.topbar { height:var(--header-h); background:var(--white); border-bottom:1px solid var(--border-light); display:flex; align-items:center; justify-content:space-between; padding:0 24px; flex-shrink:0; z-index:10; }
.topbar-left { display:flex; align-items:center; gap:12px; }
.breadcrumb { font-size:13px; color:var(--text-muted); }
.breadcrumb a { color:var(--primary); text-decoration:none; cursor:pointer; }
.breadcrumb a:hover { text-decoration:underline; }
.topbar-right { display:flex; align-items:center; gap:16px; }
.user-avatar { width:28px; height:28px; border-radius:50%; background:var(--primary-light); color:var(--primary); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; cursor:pointer; }

.page-content { flex:1; overflow:auto; padding:16px 20px; }

.screen { display:none; }
.screen.active { display:block; }

/* ── 登录页 (全屏) ── */
.login-screen { display:none; height:100vh; background:linear-gradient(135deg,#1677FF 0%,#0958d9 100%); position:relative; overflow:hidden; }
.login-screen.active { display:flex; }
.login-left { flex:1; display:flex; flex-direction:column; justify-content:center; padding:60px 80px; color:#fff; position:relative; z-index:1; }
.login-brand { font-size:32px; font-weight:700; margin-bottom:12px; letter-spacing:1px; }
.login-subtitle { font-size:16px; opacity:.85; line-height:1.6; max-width:420px; }
.login-right { width:480px; display:flex; align-items:center; justify-content:center; background:var(--white); position:relative; z-index:1; box-shadow:-8px 0 30px rgba(0,0,0,.1); }
.login-card { width:360px; }
.login-title { font-size:22px; font-weight:600; color:var(--text-primary); margin-bottom:28px; text-align:center; }
.role-tabs { display:flex; border-bottom:2px solid var(--border-light); margin-bottom:28px; }
.role-tab { flex:1; text-align:center; padding:10px 0; cursor:pointer; color:var(--text-secondary); font-size:14px; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .2s; }
.role-tab.active { color:var(--primary); border-bottom-color:var(--primary); font-weight:500; }
.form-item { margin-bottom:20px; }
.form-label { display:block; font-size:13px; color:var(--text-secondary); margin-bottom:6px; }
.form-input { width:100%; height:38px; border:1px solid var(--border); border-radius:var(--radius); padding:0 12px; font-size:14px; outline:none; transition:border .2s; }
.form-input:focus { border-color:var(--primary); box-shadow:0 0 0 2px var(--primary-light); }
.btn-primary { width:100%; height:40px; background:var(--primary); color:#fff; border:none; border-radius:var(--radius); font-size:14px; cursor:pointer; transition:background .2s; font-weight:500; }
.btn-primary:hover { background:var(--primary-hover); }
.login-footer { text-align:center; margin-top:20px; font-size:12px; color:var(--text-muted); }

/* ── 表格组件 ── */
.filter-bar { background:var(--white); padding:16px 20px; border-radius:var(--radius); margin-bottom:16px; display:flex; align-items:flex-end; gap:12px; flex-wrap:wrap; border:1px solid var(--border-light); }
.filter-item { display:flex; flex-direction:column; gap:4px; min-width:140px; }
.filter-item label { font-size:12px; color:var(--text-secondary); }
.filter-select, .filter-input { height:32px; border:1px solid var(--border); border-radius:var(--radius); padding:0 8px; font-size:13px; outline:none; min-width:140px; }
.filter-select:focus, .filter-input:focus { border-color:var(--primary); }
.filter-actions { margin-left:auto; display:flex; gap:8px; align-items:flex-end; padding-bottom:0; }
.btn { height:32px; padding:0 15px; border-radius:var(--radius); border:1px solid var(--border); background:var(--white); font-size:13px; cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:4px; white-space:nowrap; }
.btn:hover { border-color:var(--primary); color:var(--primary); }
.btn-primary-sm { background:var(--primary); color:#fff; border-color:var(--primary); }
.btn-primary-sm:hover { background:var(--primary-hover); border-color:var(--primary-hover); color:#fff; }
.btn-success-sm { background:var(--success); color:#fff; border-color:var(--success); }
.btn-danger-sm { background:var(--danger); color:#fff; border-color:var(--danger); }
.btn-warning-sm { background:var(--warning); color:#333; border-color:var(--warning); }

.data-table { width:100%; background:var(--white); border:1px solid var(--border-light); border-radius:var(--radius); overflow:hidden; }
.data-table table { width:100%; border-collapse:collapse; }
.data-table th { background:var(--table-header-bg); padding:10px 12px; text-align:left; font-size:13px; color:var(--text-secondary); font-weight:500; border-bottom:1px solid var(--border-light); white-space:nowrap; }
.data-table td { padding:10px 12px; border-bottom:1px solid var(--border-light); font-size:13px; color:var(--text-primary); vertical-align:middle; }
.data-table tr:last-child td { border-bottom:none; }
.data-table tr:hover td { background:#fafafa; }
.table-pagination { padding:12px 16px; display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--border-light); font-size:12px; color:var(--text-muted); }

/* 状态标签 */
.badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:10px; font-size:12px; font-weight:500; }
.badge-dot { width:6px; height:6px; border-radius:50%; }
.badge-success { background:var(--success-bg); color:var(--success); } .badge-success .badge-dot { background:var(--success); }
.badge-danger { background:var(--danger-bg); color:var(--danger); } .badge-danger .badge-dot { background:var(--danger); }
.badge-warning { background:var(--warning-bg); color:#d48806; } .badge-warning .badge-dot { background:var(--warning); }
.badge-default { background:#f5f5f5; color:var(--text-secondary); } .badge-default .badge-dot { background:var(--text-muted); }

/* 链接操作 */
.link-action { color:var(--primary); cursor:pointer; font-size:13px; text-decoration:none; margin-right:12px; }
.link-action:hover { color:var(--primary-hover); text-decoration:underline; }

/* ── 冻结列（固定列）表格 ── */
.ft-wrap { position:relative; overflow:auto; max-height:calc(100vh - 232px); border:1px solid var(--border-light); border-radius:var(--radius); background:var(--white); box-shadow:var(--shadow-card); }
.ft-table { border-collapse:separate; border-spacing:0; width:100%; min-width:1760px; }
.ft-table th, .ft-table td { box-sizing:border-box; padding:11px 14px; font-size:13px; text-align:left; white-space:nowrap; border-bottom:1px solid var(--border-light); color:var(--text-primary); vertical-align:middle; }
.ft-table thead th { background:var(--table-header-bg); color:var(--text-secondary); font-weight:500; position:sticky; z-index:3; height:40px; }
.ft-thead-row1 th { top:0; }
.ft-thead-row2 th { top:40px; box-shadow:0 1px 0 var(--border-light); }
.ft-table tbody tr:hover td { background:#FAFCFF; }
.ft-table tbody tr:last-child td { border-bottom:none; }

/* 冻结左列：任务ID、文件名称 */
.ft-table .ft-col-id   { position:sticky; left:0;     z-index:1; width:120px; min-width:120px; background:var(--white); }
.ft-table .ft-col-name { position:sticky; left:120px; z-index:1; width:230px; min-width:230px; background:var(--white); box-shadow:2px 0 5px -2px rgba(0,0,0,.13); }
/* 冻结右列：操作 */
.ft-table .ft-col-op   { position:sticky; right:0;    z-index:1; width:240px; min-width:240px; background:var(--white); box-shadow:-2px 0 5px -2px rgba(0,0,0,.13); }
/* 冻结列表头需压住所有滚动内容 */
.ft-table thead .ft-col-id, .ft-table thead .ft-col-name, .ft-table thead .ft-col-op { z-index:5; background:var(--table-header-bg); }

/* 审核点分组 + 数字列 */
.ft-group { text-align:center; }
.ft-num { text-align:center; font-variant-numeric:tabular-nums; }
.ft-num.fail { color:var(--danger); font-weight:600; }
.ft-num.pend { color:var(--warning); font-weight:600; }
.ft-num.muted { color:var(--text-muted); }
.ft-op-none { color:var(--text-muted); }
.ft-scroll-hint { font-size:11.5px; color:var(--text-muted); margin-top:10px; display:flex; align-items:center; gap:6px; }
.ft-scroll-hint .ft-arrow { color:var(--primary); font-weight:600; }

.link-danger { color:var(--danger); cursor:pointer; }

/* ── Dashboard 卡片 ── */
.kpi-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:16px; }
.kpi-card { background:var(--white); border-radius:var(--radius); padding:20px; border:1px solid var(--border-light); }
.kpi-value { font-size:28px; font-weight:700; color:var(--text-primary); line-height:1.2; }
.kpi-label { font-size:13px; color:var(--text-muted); margin-top:4px; }
.kpi-trend { font-size:12px; margin-top:6px; }
.trend-up { color:var(--success); }
.trend-down { color:var(--danger); }

.chart-row { display:grid; grid-template-columns:2fr 1fr 1fr; gap:16px; margin-bottom:16px; }
.chart-card { background:var(--white); border-radius:var(--radius); padding:20px; border:1px solid var(--border-light); }
.chart-title { font-size:14px; font-weight:600; color:var(--text-primary); margin-bottom:16px; }
.chart-placeholder { height:200px; background:#f9f9f9; border-radius:var(--radius); display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-size:13px; }

/* ── 三栏审核详情（核心屏）★ ── */
.review-header { background:var(--white); padding:16px 20px; border-radius:var(--radius); margin-bottom:16px; border:1px solid var(--border-light); }
.review-summary-cards { display:flex; gap:12px; flex-wrap:wrap; margin-top:12px; }
.summary-card { padding:10px 16px; border-radius:var(--radius); border:1px solid var(--border-light); min-width:120px; }
.summary-num { font-size:22px; font-weight:700; }
.summary-label { font-size:12px; color:var(--text-muted); margin-top:2px; }

.three-col { display:flex; gap:16px; height:calc(100vh - 280px); min-height:500px; }
.col-left { width:40%; min-width:340px; background:var(--white); border-radius:var(--radius); border:1px solid var(--border-light); display:flex; flex-direction:column; overflow:hidden; }
.col-mid { flex:1; background:var(--white); border-radius:var(--radius); border:1px solid var(--border-light); display:flex; flex-direction:column; overflow:hidden; }
.col-right { width:320px; background:var(--white); border-radius:var(--radius); border:1px solid var(--border-light); display:flex; flex-direction:column; overflow:hidden; }

.col-header { padding:12px 16px; border-bottom:1px solid var(--border-light); font-size:13px; font-weight:600; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
.col-body { flex:1; overflow:auto; padding:16px; }

/* 左栏原图区 */
.image-preview { width:100%; border:1px solid var(--border); border-radius:var(--radius); position:relative; }
.image-preview img { width:100%; display:block; border-radius:var(--radius); }
.annot-box { position:absolute; border:2px solid var(--danger); background:rgba(245,34,45,.08); border-radius:2px; pointer-events:none; }
.annot-label { position:absolute; top:-22px; left:0; background:var(--danger); color:#fff; font-size:11px; padding:1px 6px; border-radius:3px; white-space:nowrap; }
.image-toolbar { display:flex; gap:8px; margin-top:8px; }

/* 中栏 OCR 文本 */
.ocr-text { font-family:"SF Mono","Consolas","Liberation Mono",Menlo,monospace; font-size:12.5px; line-height:1.8; white-space:pre-wrap; word-break:break-all; }
.ocr-line { display:flex; gap:8px; padding:2px 4px; border-radius:2px; transition:background .15s; cursor:pointer; }
.ocr-line:hover { background:var(--primary-light); }
.ocr-line.highlight { background:var(--warning-bg); }
.ocr-line-num { color:var(--text-muted); user-select:none; min-width:24px; text-align:right; flex-shrink:0; }
.confidence-bar { margin-top:8px; padding:8px 12px; background:var(--warning-bg); border-radius:var(--radius); font-size:12px; color:#d48806; display:flex; align-items:center; gap:6px; }

/* 右栏差异列表 */
.diff-tabs { display:flex; gap:4px; padding:8px 16px 0; border-bottom:1px solid var(--border-light); flex-shrink:0; }
.diff-tab { padding:6px 12px; font-size:12px; color:var(--text-secondary); cursor:pointer; border-radius:var(--radius) var(--radius) 0 0; border-bottom:2px solid transparent; margin-bottom:-1px; }
.diff-tab.active { color:var(--primary); border-bottom-color:var(--primary); background:var(--primary-light); }
.diff-list { flex:1; overflow:auto; }
.diff-item { padding:10px 0; border-bottom:1px solid var(--border-light); }
.diff-item:last-child { border:none; }
.diff-name { font-size:13px; color:var(--text-primary); margin-bottom:4px; }
.diff-desc { font-size:12px; color:var(--text-secondary); margin-bottom:6px; }
.decision-btns { display:flex; gap:8px; padding:16px; border-top:1px solid var(--border-light); flex-shrink:0; }
.decision-btns .btn { flex:1; justify-content:center; height:36px; }

/* ── 弹窗组件 ── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1000; justify-content:center; align-items:center; }
.modal-overlay.show { display:flex; }
.modal { background:var(--white); border-radius:8px; width:680px; max-height:80vh; display:flex; flex-direction:column; box-shadow:0 6px 24px rgba(0,0,0,.15); }
.modal-header { padding:16px 24px; border-bottom:1px solid var(--border-light); display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
.modal-title { font-size:16px; font-weight:600; }
.modal-close { width:28px; height:28px; border:none; background:none; cursor:pointer; font-size:18px; color:var(--text-muted); border-radius:50%; display:flex; align-items:center; justify-content:center; }
.modal-close:hover { background:#f5f5f5; }
.modal-body { padding:24px; overflow:auto; flex:1; }
.modal-footer { padding:12px 24px; border-top:1px solid var(--border-light); display:flex; justify-content:flex-end; gap:8px; flex-shrink:0; }

/* 上传弹窗特定 */
.upload-zone { border:2px dashed var(--border); border-radius:var(--radius); padding:40px; text-align:center; cursor:pointer; transition:border .2s; margin-bottom:16px; }
.upload-zone:hover { border-color:var(--primary); }
.upload-zone-icon { font-size:40px; color:var(--text-muted); margin-bottom:8px; }
.upload-zone-text { font-size:14px; color:var(--text-secondary); margin-bottom:4px; }
.upload-zone-hint { font-size:12px; color:var(--text-muted); }
.upload-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
.upload-thumb { aspect-ratio:1; border:1px solid var(--border); border-radius:var(--radius); display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; overflow:hidden; }
.upload-thumb img { max-width:100%; max-height:100%; object-fit:contain; }
.upload-thumb-status { position:absolute; bottom:0; left:0; right:0; padding:2px; font-size:11px; text-align:center; }

/* ── 规则库左侧树 ── */
.rule-tree { width:220px; background:var(--white); border:1px solid var(--border-light); border-radius:var(--radius); display:flex; flex-direction:column; flex-shrink:0; }
.tree-header { padding:12px 16px; font-weight:600; font-size:14px; border-bottom:1px solid var(--border-light); }
.tree-body { flex:1; overflow:auto; padding:8px 0; }
.tree-node { padding:8px 16px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; font-size:13px; color:var(--text-secondary); }
.tree-node:hover { background:#f5f5f5; }
.tree-node.active { color:var(--primary); background:var(--primary-light); font-weight:500; }
.tree-count { font-size:11px; color:var(--text-muted); }

/* ── 人工复核布局 ── */
.review-split { display:flex; gap:16px; height:calc(100vh - 180px); }
.review-queue { width:320px; background:var(--white); border:1px solid var(--border-light); border-radius:var(--radius); display:flex; flex-direction:column; overflow:hidden; }
.queue-item { padding:12px 16px; border-bottom:1px solid var(--border-light); cursor:pointer; transition:bg .15s; }
.queue-item:hover { background:#f5f5f5; }
.queue-item.active { background:var(--primary-light); }
.queue-name { font-size:13px; font-weight:500; margin-bottom:4px; }
.queue-meta { font-size:12px; color:var(--text-muted); display:flex; gap:12px; }
.review-panel { flex:1; background:var(--white); border:1px solid var(--border-light); border-radius:var(--radius); padding:24px; overflow:auto; }
.review-compare { display:grid; grid-template-columns:1fr 1fr; gap:24px; margin:20px 0; }
.compare-box { padding:16px; border:1px solid var(--border-light); border-radius:var(--radius); }
.compare-label { font-size:12px; color:var(--text-muted); margin-bottom:8px; }
.compare-val { font-size:14px; font-weight:500; }

/* ── 智能体模型配置 ── */

/* ── 配置表单 ── */

/* ── 文件缩略图 ── */

/* ── Tab 组件 ── */
.tabs { display:flex; border-bottom:1px solid var(--border-light); margin-bottom:16px; }

/* ── 滚动条美化 ── */

/* ═════════════════════════════════════════

/* 审核详情顶栏 */

.pipeline-step .ps-idx { background:var(--primary); color:#fff; border-radius:50%; width:14px; height:14px; font-size:9px; display:inline-flex; align-items:center; justify-content:center; }
.pipeline-arrow { color:var(--text-muted); font-size:11px; }

/* 审核结果概览区（右栏顶部） */
.result-overview { padding:10px 12px 8px; flex-shrink:0; border-bottom:1px solid var(--border-light); background:#FAFBFC; }
.overview-head { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:8px; }
.overview-title { font-size:13.5px; font-weight:650; color:var(--text-primary); letter-spacing:-0.15px; }
.overview-progress { display:flex; align-items:baseline; gap:4px; }
.op-val { font-size:22px; font-weight:700; color:var(--text-primary); }
.op-total { font-size:13px; font-weight:500; color:var(--text-muted); }
.op-label { font-size:12px; color:var(--text-muted); margin-left:1px; }

.status-summary { display:flex; gap:6px; margin-bottom:8px; }
.ss-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:8px 4px; border-radius:7px; border:1px solid var(--border-light); background:#FBFBFB; }
.ss-num { font-size:18px; font-weight:700; line-height:1; }

.ss-item { cursor:pointer; transition:all .15s; }
.ss-item:hover { box-shadow:0 2px 8px rgba(0,0,0,.08); transform:translateY(-1px); }
.ss-item.active { box-shadow:0 0 0 2px rgba(0,0,0,.04) inset; border-color:currentColor; }

.progress-track { height:5px; border-radius:3px; background:#F0F0F0; overflow:hidden; margin-bottom:10px; }
.progress-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,#1677FF,#69B1FF); }

.filter-bar-right { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:8px; }
.filter-pill { padding:2px 9px; border-radius:11px; font-size:11.5px; cursor:pointer; border:1px solid var(--border); background:var(--white); color:var(--text-secondary); transition:all .15s ease; }
.filter-pill:hover { border-color:var(--primary); color:var(--primary); }
.filter-pill.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.filter-pill-add { border-style:dashed; color:var(--text-muted); }

.result-search { position:relative; margin-bottom:2px; }
.result-search input { width:100%; height:30px; border:1px solid var(--border); border-radius:var(--radius); padding:0 28px 0 10px; font-size:12px; outline:none; }
.result-search input:focus { border-color:var(--primary); }
.result-search-icon { position:absolute; right:8px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:12px; pointer-events:none; }

/* 审核结果卡片 */
.result-cards { flex:1; overflow:auto; padding:6px 10px 10px; }
.result-card { border:1px solid var(--border-light); border-radius:7px; padding:10px 12px; margin-bottom:8px; cursor:pointer; transition:all .2s ease; position:relative; background:#fff; }

.result-card-head { display:flex; align-items:center; gap:7px; margin-bottom:5px; }
.card-num { display:inline-flex; align-items:center; justify-content:center; min-width:44px; height:20px; padding:0 6px; border-radius:3px; font-size:11px; font-weight:600; flex-shrink:0; }
.num-correct { background:#F6FFED; color:#52C41A; border:1px solid #B7EB8F; }

.num-rule { background:#FFF7E6; color:#D48806; border:1px solid #FFE58F; }
.card-tag { font-size:11px; padding:1px 7px; border-radius:10px; font-weight:500; }
.tag-text { background:#E6F4FF; color:#1677FF; }

.cs-fail { background:#FFF2F0; color:#F5222D; }
.cs-pass { background:#F6FFED; color:#52C41A; }

.result-card-desc { font-size:12.5px; color:var(--text-primary); line-height:1.6; margin-bottom:4px; }
.result-card-meta { display:flex; justify-content:space-between; align-items:center; }
.card-idx { font-weight:700; color:var(--primary); margin-right:6px; font-size:12.5px; }
.result-empty { text-align:center; color:var(--text-muted); font-size:13px; padding:38px 0; }
.review-footer { display:flex; align-items:center; gap:8px; padding:11px 20px; border-top:1px solid var(--border-light); background:#FAFAFA; font-size:12.5px; color:var(--text-secondary); line-height:1.5; flex-shrink:0; }
.review-footer .rf-icon { font-size:15px; }
.review-footer strong { color:var(--text-primary); }
.card-time { font-size:11px; color:var(--text-muted); }
.card-action { font-size:11px; color:var(--primary); cursor:pointer; white-space:nowrap; font-weight:500; }
.card-action:hover { text-decoration:underline; }
.card-reason { font-size:11.5px; line-height:1.55; padding:4px 8px; border-radius:0 5px 5px 0; margin-bottom:6px; border-left:2.5px solid var(--border); background:#FAFAFA; color:var(--text-secondary); }
.card-reason.pend { border-left-color:#D48806; color:#AD6800; }
.card-reason.fail { border-left-color:#F5222D; color:#CF1322; }

/* 左栏原图区增强 */
.image-header { display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--border-light); flex-shrink:0; background:#FAFBFC; }
.image-filename { font-size:13px; font-weight:500; color:var(--text-primary); }

.img-tb-btn { width:26px; height:26px; border:1px solid var(--border); border-radius:4px; background:var(--white); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--text-secondary); transition:all .15s; }
.img-tb-btn:hover { border-color:var(--primary); color:var(--primary); }
.image-canvas { flex:1; overflow:auto; background:#EDEDED; display:block; padding:12px; position:relative; }
.image-canvas img { display:block; max-width:none; border-radius:3px; box-shadow:0 2px 10px rgba(0,0,0,.09); position:relative; z-index:1; }
/* 缩放容器：img + 标注层一起缩放 */
.image-zoom-wrap { position:relative; transform-origin:top left; }
.image-zoom-wrap img { width:100%; height:auto; }
/* 多页翻页底栏 */
.page-nav { display:flex; align-items:center; justify-content:center; gap:10px; padding:6px 8px; border-top:1px solid var(--border-light); background:#F5F5F5; flex-shrink:0; font-size:12px; color:var(--text-secondary); }
.page-nav button { width:24px; height:24px; border:1px solid var(--border); border-radius:4px; background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:13px; color:var(--text-secondary); }
.page-nav button:hover { border-color:var(--primary); color:var(--primary); }

.page-placeholder { width:100%; min-height:320px; border:2px dashed #D9D9D9; border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#8C8C8C; background:#FAFAFA; gap:8px; }
.page-placeholder .ph-icon { font-size:34px; }

/* ═══ 覆盖式标注层（真实图片上的标注框） ═══ */
.annot-layer { position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2; }
.anno-box { position:absolute;border:2px solid transparent;border-radius:3px;transition:all .25s ease;box-sizing:border-box; }
.anno-box.active { border-color:#F5222D;background:rgba(245,34,45,.07);box-shadow:0 0 0 3px rgba(245,34,45,.15), inset 0 0 12px rgba(245,34,45,.08);animation:annoPulse .8s ease-in-out infinite alternate; }
@keyframes annoPulse { from{box-shadow:0 0 0 2px rgba(245,34,45,.12);} to{box-shadow:0 0 0 7px rgba(245,34,45,0);} }
.anno-tag { position:absolute;top:-18px;left:-1px;font-size:10px;padding:1px 7px;border-radius:3px;color:#fff;font-weight:500;white-space:nowrap;opacity:0;transition:opacity .2s;line-height:1.5;pointer-events:none; }

};

const NAV = {
  uploader: [
    { key:'batch-upload', icon:'📤', label:'批量上传' },
    { key:'my-submissions', icon:'📋', label:'我的提交' },
  ],
  reviewer: [
    { key:'dashboard', icon:'📊', label:'工作台' },
    { key:'task-list', icon:'📝', label:'审核任务' },
    { key:'rule-library', icon:'📏', label:'审核规则库' },
    { key:'eval-center', icon:'🎯', label:'评测中心' },
  ],
  admin: [
    { key:'rule-library', icon:'📏', label:'规则库' },
    { key:'knowledge-base', icon:'📚', label:'知识库' },
    { key:'model-config', icon:'⚙️', label:'模型配置' },
    { key:'user-permission', icon:'👥', label:'用户权限' },
  ],
};

let currentRole = 'reviewer';
let currentPage = 'dashboard';

function switchRole(el) {
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const roles = ['uploader','reviewer','admin'];
  currentRole = roles.indexOf(el);
}

function showApp() {
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('app').style.display = '';
  
  // 根据角色设置默认页和用户
  if (currentRole === 'uploader') { currentPage = 'batch-upload'; document.getElementById('currentUser').textContent = '上传方 · 李晓华'; }
  else if (currentRole === 'admin') { currentPage = 'rule-library'; document.getElementById('currentUser').textContent = '管理员 · 钱进'; }
  else { currentPage = 'dashboard'; document.getElementById('currentUser').textContent = '审核员 · 张明远'; }
  
  renderSidebar();
  navigateTo(currentPage);
}

function logout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('screen-login').classList.add('active');
}

function renderSidebar() {
  const nav = NAV[currentRole] || NAV.reviewer;
  let html = '';
  nav.forEach(item => {
    html += `<div class="nav-item ${currentPage === item.key ? 'active' : ''}" onclick="navigateTo('${item.key}')"><span class="nav-icon">${item.icon}</span>${item.label}</div>`;
  });
  // 加上角色切换提示
  if (currentRole !== 'admin') {
    html += `<div class="nav-label" style="margin-top:16px;">快捷入口</div>`;
    if (currentRole === 'reviewer') {
      html += `<div class="nav-item" onclick="currentRole='admin';currentPage='rule-library';renderSidebar();navigateTo('rule-library')" style="opacity:.7;font-size:12px;">🔧 管理员视图</div>`;
    }
  }
  document.getElementById('sidebarNav').innerHTML = html;
}

function navigateTo(pageKey) {
  const page = PAGES[pageKey];
  if (!page) return;
  currentPage = pageKey;
  
  // 渲染页面内容
  const tpl = document.getElementById(page.tpl);
  if (tpl) {
    document.getElementById('pageContent').innerHTML = tpl.innerHTML;
  }
  
  // 更新面包屑
  const roleLabel = { uploader:'上传方', reviewer:'审核员', admin:'管理员' };
  document.getElementById('breadcrumb').innerHTML = `<a onclick="navigateTo('${NAV[currentRole][0]?.key||''})">${roleLabel[currentRole]}</a> / ${page.title}`;
  
  // 更新侧边栏激活状态
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const activeNav = Array.from(document.querySelectorAll('.nav-item')).find(n => n.textContent.includes(page.title));
  if (activeNav) activeNav.classList.add('active');

  // 审核详情页：初始化缩放 / 多页 / 映射连线
  if (pageKey === 'review-detail') setupReviewDetail();
  // ═ 联调：渲染后从 /api 拉取真实数据覆盖
  try { loadPage(pageKey); } catch (e) { console.warn('loadPage failed', e); }
}

//   审核规则库 — 新增 / 编辑 / 禁用 / 筛选
// ════════════════════════════════════
let ruleEditTarget = null;   // 正在编辑的 <tr>，null = 新增模式

function openRuleModal() { document.getElementById('ruleModal').classList.add('show'); }
function closeRuleModal() {

function openRuleAdd() {

function openRuleEdit(btn) {

function saveRule() {
  const level1 = document.getElementById('ruleFLevel1').value;
  const level2 = document.getElementById('ruleFLevel2').value.trim();
  const detail = document.getElementById('ruleFDetail').value.trim();
  const material = document.getElementById('ruleFMaterial').value.trim() || '全部类型';
  if (!detail) { alert('请填写检查项细则'); return; }
  const tbody = document.querySelector('#pageContent table tbody');
  if (!tbody) return;
  if (ruleEditTarget) {
    const tr = ruleEditTarget;
    tr.setAttribute('data-level1', level1);
    tr.setAttribute('data-level2', level2);
    tr.setAttribute('data-detail', detail);
    tr.setAttribute('data-material', material);
    tr.children[1].textContent = level1;
    tr.children[2].textContent = level2;
    tr.children[3].textContent = detail;
    tr.children[4].textContent = material;
  } else {
    const tr = document.createElement('tr');
    tr.setAttribute('data-id', 'r' + Date.now());
    tr.setAttribute('data-level1', level1);
    tr.setAttribute('data-level2', level2);
    tr.setAttribute('data-detail', detail);
    tr.setAttribute('data-material', material);
    tr.setAttribute('data-status', 'on');
    tr.innerHTML = '<td></td><td>' + level1 + '</td><td>' + level2 + '</td><td>' + detail + '</td><td>' + material + '</td><td><span class="badge badge-success">启用</span></td><td><a class="link-action" onclick="openRuleEdit(this)">编辑</a><a class="link-action" onclick="toggleRuleStatus(this)">禁用</a></td>';
    tbody.appendChild(tr);
    renumberRules();
  }
  filterRules();          // 保持与当前筛选条件一致
  persistRule(ruleEditTarget, { level1: level1, level2: level2, detail: detail, material: material });
  closeRuleModal();
}

function renumberRules() {
  const tbody = document.querySelector('#pageContent table tbody');
  if (!tbody) return;
  Array.from(tbody.children).forEach((tr, i) => { if (tr.children[0]) tr.children[0].textContent = i + 1; });
}

function toggleRuleStatus(btn) {
  const tr = btn.closest('tr');
  if (!tr) return;
  const badgeTd = tr.children[5];
  const actionTd = tr.children[6];
  const wasOn = tr.getAttribute('data-status') === 'on';
  if (wasOn) {
    tr.setAttribute('data-status', 'off');
    badgeTd.innerHTML = '<span class="badge badge-danger">禁用</span>';
    actionTd.innerHTML = '<a class="link-action" onclick="openRuleEdit(this)">编辑</a><a class="link-action" onclick="toggleRuleStatus(this)">启用</a>';
  } else {
    tr.setAttribute('data-status', 'on');
    badgeTd.innerHTML = '<span class="badge badge-success">启用</span>';
    actionTd.innerHTML = '<a class="link-action" onclick="openRuleEdit(this)">编辑</a><a class="link-action" onclick="toggleRuleStatus(this)">禁用</a>';
  }
  const id = tr.getAttribute('data-id');
  if (id && /^\d+$/.test(id)) {
    api('/rules/' + id + '/toggle', { method: 'POST' }).catch(function (e) { console.warn('[联调] 规则启停同步失败', e); });
  }
}

function selectRuleTree(el) {
  document.querySelectorAll('#pageContent .tree-node').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  filterRules();
}

function filterRules() {
  const tbody = document.querySelector('#pageContent table tbody');
  if (!tbody) return;
  const levelSel = document.querySelectorAll('#pageContent .filter-select')[1];
  const searchInput = document.querySelector('#pageContent .filter-input');
  const activeTree = document.querySelector('#pageContent .tree-node.active');
  const kw = (searchInput ? searchInput.value : '').trim().toLowerCase();
  const level = levelSel ? levelSel.value : '全部';
  const treeKw = activeTree ? activeTree.getAttribute('data-kw') : '全部';
  const lv = level.replace(/\s*\(\d+\)/, '').trim();
  Array.from(tbody.children).forEach(tr => {
    const l1 = tr.getAttribute('data-level1') || '';
    const detail = (tr.getAttribute('data-detail') || '').toLowerCase();
    const material = tr.getAttribute('data-material') || '';
    const levelMatch = (level === '全部') || (l1 === lv);
    const treeMatch = (treeKw === '全部') || material.includes(treeKw) || material.includes('全部');
    const kwMatch = !kw || detail.includes(kw);
    tr.style.display = (levelMatch && treeMatch && kwMatch) ? '' : 'none';
  });
}

// ════════════════════════════════════
//   审核详情 — 卡片联动标注交互
//   点击右侧审核卡片 → 左图红框 + 中间MD文本同步高亮
// ════════════════════════════════════
let activeAnnoId = null;
let imgZoom = 1.0;                 // 默认 100% 实际尺寸展示
let baseW = 0, imgAspect = 1;
let reviewPage = 1;
const TOTAL_PAGES = 2;
const SVGNS = 'http://www.w3.org/2000/svg';

// 标注区域定义（基于真实海报 易方达安瑞短债债券C 006320）
// color：映射连线 / 端点徽标颜色（与状态/类别呼应）
const ANNO_MAP = {
  // 编码按右栏分组全局顺序：文本校对(#1,#2) → 指标校对(#3,#4) → 合规规则(#5,#6)
  1: { boxes: ['box4'], mdBlocks: [],           mdLines: ['mdLine3'],  color:'#52C41A' }, // #1 基金代码（文本·通过）top 51%
  2: { boxes: ['box6'], mdBlocks: ['mdBlock5'], mdLines: [],           color:'#52C41A' }, // #2 风险提示（文本·通过）top 81%
  3: { boxes: ['box2'], mdBlocks: ['mdBlock6'], mdLines: ['mdLine6','mdLine6b'], color:'#FAAD14' }, // #3 成立时间（指标·待核对）top 13%
  4: { boxes: ['box3'], mdBlocks: ['mdBlock2'], mdLines: ['mdLine2a'], color:'#52C41A' }, // #4 历史收益率（指标·通过）top 26%
  5: { boxes: ['box1'], mdBlocks: ['mdBlock1'], mdLines: ['mdLine1a'], color:'#F5222D' }, // #5 业绩宣称（合规·不通过）top 0%
  6: { boxes: ['box5'], mdBlocks: ['mdBlock4'], mdLines: [],           color:'#F5222D' }, // #6 收益数据表（合规·不通过）top 62%
};

// ═══ 缩放控制 ═══
function applyZoom() {
  const wrap = document.getElementById('imageZoomWrap');
  const readout = document.getElementById('zoomReadout');
  if (!wrap || !baseW) return;
  const w = baseW * imgZoom;
  wrap.style.width = w + 'px';
  wrap.style.height = (w * imgAspect) + 'px';   // 显式高度，保证标注层百分比定位正确
  if (readout) readout.textContent = (imgZoom * 100).toFixed(1) + '%';
  // 必须等浏览器 reflow 完成后再画线，否则 getBoundingClientRect 返回缩放前的旧坐标
  requestAnimationFrame(() => requestAnimationFrame(drawConnectorLines));
}
function imgZoomBy(delta) {
  imgZoom = Math.min(3, Math.max(0.2, +(imgZoom + delta).toFixed(2)));
  applyZoom();
}
function imgZoomReset() { imgZoom = 1.0; applyZoom(); }

// ═══ 多页翻页 ═══
function switchPage(dir) {
  reviewPage = Math.min(TOTAL_PAGES, Math.max(1, reviewPage + dir));
  const poster = document.getElementById('imageZoomWrap');
  const ph = document.getElementById('pagePlaceholder');
  const ind = document.getElementById('pageIndicator');
  if (poster) poster.style.display = reviewPage === 1 ? '' : 'none';
  if (ph) ph.style.display = reviewPage === 2 ? 'flex' : 'none';
  if (ind) ind.textContent = reviewPage + ' / ' + TOTAL_PAGES;
  if (reviewPage !== 1) clearHighlights();   // 第2页无标注，清空连线
  else requestAnimationFrame(() => requestAnimationFrame(drawConnectorLines));
}

// ═══ 审核详情初始化（每次进入页面调用） ═══
function setupReviewDetail() {
  const img = document.getElementById('posterImg');
  const canvas = document.getElementById('imageCanvas');
  const mdBody = document.querySelector('.md-body');
  if (!img || !canvas) return;

  baseW = canvas.clientWidth - 32;            // 缩放基准 = 左栏内宽
  if (img.naturalWidth && img.naturalHeight) imgAspect = img.naturalHeight / img.naturalWidth;
  imgZoom = 1.0;
  applyZoom();
  img.onload = () => { if (img.naturalHeight) imgAspect = img.naturalHeight / img.naturalWidth; applyZoom(); };

  // 左右独立滚动时持续重绘映射连线
  canvas.onscroll = drawConnectorLines;
  if (mdBody) mdBody.onscroll = drawConnectorLines;

  reviewPage = 1;
  switchPage(0);
  requestAnimationFrame(drawConnectorLines);
}

// 容器内切面居中滚动（只滚该容器，不动整页）
function scrollToCenterIn(container, el) {
  if (!container || !el) return;
  const cRect = container.getBoundingClientRect();
  const eRect = el.getBoundingClientRect();
  const delta = (eRect.top + eRect.height / 2) - (cRect.top + cRect.height / 2);
  container.scrollTop += delta;
}

// ═══ 绘制审核映射连线（左原图 ↔ 中 MD） ═══
function drawConnectorLines() {
  const svg = document.getElementById('connectorSvg');
  const cont = document.querySelector('.three-col-v2');
  if (!svg || !cont || !cont.offsetParent) return;
  const cr = cont.getBoundingClientRect();
  svg.setAttribute('width', cr.width);
  svg.setAttribute('height', cr.height);
  svg.setAttribute('viewBox', '0 0 ' + cr.width + ' ' + cr.height);
  svg.innerHTML = '';
  if (activeAnnoId === null) return;   // 未选中任何卡片时不画映射线，保持画面干净

  Object.keys(ANNO_MAP).forEach(id => {
    const anno = ANNO_MAP[id];
    const box = document.getElementById(anno.boxes[0]);
    const midId = anno.mdBlocks[0] || anno.mdLines[0];
    const mid = midId ? document.getElementById(midId) : null;
    if (!box || !mid) return;
    const br = box.getBoundingClientRect();
    const mr = mid.getBoundingClientRect();
    if (br.width === 0 || mr.width === 0) return;
    const x1 = br.right - cr.left;
    const y1 = br.top + br.height / 2 - cr.top;
    const x2 = mr.left - cr.left;
    const y2 = mr.top + mr.height / 2 - cr.top;
    const dx = Math.max(40, Math.abs(x2 - x1) * 0.5);
    const d = 'M ' + x1 + ' ' + y1 + ' C ' + (x1 + dx) + ' ' + y1 + ', ' + (x2 - dx) + ' ' + y2 + ', ' + x2 + ' ' + y2;
    const isActive = (String(id) === String(activeAnnoId));

    const path = document.createElementNS(SVGNS, 'path');
    path.setAttribute('d', d);
    path.setAttribute('class', 'conn-path' + (isActive ? ' conn-path-active' : ''));
    path.setAttribute('stroke', isActive ? anno.color : 'rgba(140,140,140,.22)');
    path.setAttribute('stroke-width', isActive ? 2.6 : 1);
    svg.appendChild(path);

    // 选中态：两端圆点 + 序号徽标（其余淡化消失）
    if (isActive) {
      [[x1, y1], [x2, y2]].forEach(pt => {
        const c = document.createElementNS(SVGNS, 'circle');
        c.setAttribute('cx', pt[0]); c.setAttribute('cy', pt[1]); c.setAttribute('r', 5);
        c.setAttribute('fill', anno.color); c.setAttribute('class', 'conn-dot');
        svg.appendChild(c);
        const t = document.createElementNS(SVGNS, 'text');
        t.setAttribute('x', pt[0]); t.setAttribute('y', pt[1] + 3.2);
        t.setAttribute('class', 'conn-num');
        t.textContent = id;
        svg.appendChild(t);
      });
    }
  });
}

// ═══ 点击右侧审核卡片 → 三栏联动定位 ═══
function highlightAnnotation(annoId) {
  clearHighlights();
  activeAnnoId = annoId;
  const anno = ANNO_MAP[annoId];
  if (!anno) return;

  // 1. 激活右侧卡片
  document.querySelectorAll('.result-card').forEach(c => c.classList.remove('active'));
  const activeCard = document.querySelector(`.result-card[data-anno="${annoId}"]`);
  if (activeCard) {
    activeCard.classList.add('active');
    activeCard.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }

  // 2. 左图标注框高亮（红框）
  anno.boxes.forEach(boxId => {
    const box = document.getElementById(boxId);
    if (box) box.classList.add('active');
  });

  // 3. 中间 MD 块级 / 行内高亮
  anno.mdBlocks.forEach(blockId => {
    const block = document.getElementById(blockId);
    if (block) block.classList.add('highlighted');
  });
  anno.mdLines.forEach(lineId => {
    const line = document.getElementById(lineId);
    if (line) line.classList.add('highlighted');
  });

  // 4. 双文档同步浏览：左右独立滚动到对应位置，自动对齐
  const canvas = document.getElementById('imageCanvas');
  const mdBody = document.querySelector('.md-body');
  const box = document.getElementById(anno.boxes[0]);
  const midId = anno.mdBlocks[0] || anno.mdLines[0];
  const mid = midId ? document.getElementById(midId) : null;
  if (canvas && box) scrollToCenterIn(canvas, box);
  if (mdBody && mid) scrollToCenterIn(mdBody, mid);

  // 5. 绘制映射连线（滚动事件会持续重绘，保证两端始终对齐）
  requestAnimationFrame(drawConnectorLines);
}

function clearHighlights() {
  activeAnnoId = null;
  document.querySelectorAll('.result-card').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.anno-box').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.md-block-anno.highlighted').forEach(b => b.classList.remove('highlighted'));
  document.querySelectorAll('.md-line.highlighted, .md-line.annot-target.highlighted').forEach(l => l.classList.remove('highlighted'));
  drawConnectorLines();
}

// ═══ 右栏筛选：类别 + 状态 + 搜索（三者 AND 组合） ═══
let curCatFilter = 'all';
let curStatusFilter = 'all';
let curSearchText = '';

function applyResultFilters() {
  document.querySelectorAll('#resultCardsList .result-card').forEach(card => {
    const grp = card.closest('.cat-group');
    const cat = grp ? grp.getAttribute('data-cat') : '';
    const status = card.getAttribute('data-status') || '';
    const okCat = (curCatFilter === 'all') || (cat === curCatFilter);
    const okStatus = (curStatusFilter === 'all') || (status === curStatusFilter);
    const txt = card.textContent.toLowerCase();
    const okSearch = !curSearchText || txt.indexOf(curSearchText) !== -1;
    card.style.display = (okCat && okStatus && okSearch) ? '' : 'none';
  });
  // 隐藏没有可见卡片的类别分组
  document.querySelectorAll('#resultCardsList .cat-group').forEach(g => {
    const anyVisible = Array.from(g.querySelectorAll('.result-card')).some(c => c.style.display !== 'none');
    g.style.display = anyVisible ? '' : 'none';
  });
  // 空状态提示
  const wrap = document.getElementById('resultCardsList');
  if (!wrap) return;
  let empty = wrap.querySelector('.result-empty');
  const anyCard = Array.from(wrap.querySelectorAll('.result-card')).some(c => c.style.display !== 'none');
  if (!anyCard && !empty) {
    empty = document.createElement('div');
    empty.className = 'result-empty';
    empty.textContent = '没有符合筛选条件的审核项';
    wrap.appendChild(empty);
  } else if (anyCard && empty) {
    empty.remove();
  }
}

function toggleStatusFilter(s) {
  curStatusFilter = (curStatusFilter === s) ? 'all' : s;
  document.querySelectorAll('.ss-item').forEach(it => {
    it.classList.toggle('active', curStatusFilter !== 'all' && it.getAttribute('data-status') === curStatusFilter);
  });
  applyResultFilters();
}

document.addEventListener('click', function(e) {
  // 类别筛选（文本校对 / 指标校对 / 合规规则）
  const pill = e.target.closest('.filter-pill');
  if (pill) {
    const parent = pill.parentElement;
    parent.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    curCatFilter = pill.getAttribute('data-filter') || 'all';
    applyResultFilters();
  }
  // 状态筛选（通过 / 不通过 / 待人工核对）
  const ss = e.target.closest('.ss-item');
  if (ss) {
    toggleStatusFilter(ss.getAttribute('data-status'));
  }
});

// 搜索框：按审核项内容 / 命中规则条款过滤
const rsInput = document.getElementById('resultSearchInput');
if (rsInput) rsInput.addEventListener('input', function() {
  curSearchText = (this.value || '').trim().toLowerCase();
  applyResultFilters();
});

// 窗口缩放时重算基准宽度并重绘
window.addEventListener('resize', function() {
  const cont = document.querySelector('.three-col-v2');
  if (cont && cont.offsetParent) {
    const canvas = document.getElementById('imageCanvas');
    if (canvas && canvas.clientWidth) baseW = canvas.clientWidth - 32;
    applyZoom();
  }
});

// ════════════════════════════════════
//   智能体模型配置 — 启停 + 阈值联动
function toggleAgentStatus(btn, badgeId){
  const b = document.getElementById(badgeId);
  if(!b) return;
  const on = b.classList.contains('badge-success');
  const next = !on;
  if(on){ b.classList.remove('badge-success'); b.classList.add('badge-danger'); b.textContent='禁用'; btn.textContent='启用'; }
  else   { b.classList.remove('badge-danger'); b.classList.add('badge-success'); b.textContent='启用'; btn.textContent='禁用'; }
  const m = /badge-ag(\d+)/.exec(badgeId || '');
  if (m && window._agentKeys) {
    const key = window._agentKeys[+m[1] - 1];
    if (key) {
      api('/config/agents/' + key, { method:'PUT', body:{ enabled: next ? 1 : 0 } })
        .catch(function (e) { console.warn('[联调] 智能体启停同步失败', e); });
    }
  }
}
function updateSlider(slider){
  const f = slider.closest('.form-field');
  const v = f && f.querySelector('.thr-val');
  if(v) v.textContent = slider.value + '%';
}
</script>
<script>
/* ══════════════════════════════════════════════════
   前后端联调层 —— 真实调用后端 /api（不改动任何原有字段/列/按钮）
   访问方式：经后端托管 http://localhost:3000/v1-review-prototype.html
   （file:// 直接打开会因同源策略无法 fetch /api，请用上面的地址）
   ══════════════════════════════════════════════════ */
'use strict';
const PRODUCT_MAP = { P000843:'易方达安瑞短债C类', P000842:'理财稳健型', P000839:'养老FOF系列', P000835:'投教专栏', P000834:'季度营销' };
let currentTaskId = 'P000843';
window._agentKeys = [];

/* ---------- 通用 API 客户端 ---------- */
async function api(path, opts) {
  opts = opts || {};
  const res = await fetch('/api' + path, {
    method: opts.method || 'GET',
    headers: { 'Content-Type': 'application/json' },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  let data = null;
  try { data = await res.json(); } catch (e) { data = null; }
  if (!res.ok) throw new Error((data && data.error) || ('HTTP ' + res.status));
  return data;
}
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
    return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
  });
}
function statusBadge(s) {
  if (s === '审核成功' || s === '通过' || s === '已生效' || s === '启用') return 'badge-success';
  if (s === '不通过' || s === '审核异常') return 'badge-danger';
  if (s === '待人工复核') return 'badge-warning';
  return 'badge-default';
}

/* ---------- 页面分发 ---------- */
function loadPage(pageKey) {
  switch (pageKey) {
    case 'dashboard': loadDashboard(); break;
    case 'task-list': loadTaskList(); break;
    case 'review-detail': loadReviewDetail(); break;
    case 'rule-library': loadRules(); break;
    case 'knowledge-base': loadKnowledge(); break;
    case 'model-config': loadModelConfig(); break;
    case 'eval-center': loadEvals(); break;
  }
}
function openReview(id) { currentTaskId = id; navigateTo('review-detail'); }

/* ---------- 工作台 ---------- */
function drawTrend(trend) {
  const svg = document.querySelector('#pageContent .chart-svg');
  if (!svg) return;
  const W = 540, base = 190, topY = 20, padX = 15;
  const maxC = Math.max.apply(null, trend.map(function (t) { return t.count; }).concat([1]));
  const n = trend.length;
  const xs = trend.map(function (t, i) {
    return padX + (n <= 1 ? (W - padX * 2) / 2 : i * (W - 2 * padX) / (n - 1));
  });
  const ys = trend.map(function (t) { return base - (t.count / maxC) * (base - topY); });
  const solid = xs.map(function (x, i) { return x + ',' + ys[i]; }).join(' ');
  const area = 'M' + xs[0] + ',' + base + ' L' + solid.replace(/ /g, ' L') + ' L' + xs[n - 1] + ',' + base + ' Z';
  let circles = '';
  xs.forEach(function (x, i) { circles += '<circle cx="' + x + '" cy="' + ys[i] + '" r="3" fill="#1677FF"/>'; });
  svg.innerHTML =
    '<defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1677FF" stop-opacity=".20"/><stop offset="100%" stop-color="#1677FF" stop-opacity="0"/></linearGradient></defs>' +
    '<line x1="0" y1="45" x2="540" y2="45" stroke="#F0F0F0"/><line x1="0" y1="95" x2="540" y2="95" stroke="#F0F0F0"/><line x1="0" y1="145" x2="540" y2="145" stroke="#F0F0F0"/><line x1="0" y1="190" x2="540" y2="190" stroke="#F0F0F0"/>' +
    '<path d="' + area + '" fill="url(#areaGrad)"/>' +
    '<polyline points="' + solid + '" fill="none" stroke="#1677FF" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>' +
    circles;
}
async function loadDashboard() {
  try {
    const d = await api('/dashboard');
    if (!d || !d.kpis) return;
    const kv = document.querySelectorAll('#pageContent .kpi-value');
    if (kv[0]) kv[0].textContent = d.kpis.total;
    if (kv[1]) kv[1].textContent = d.kpis.avgConf + '%';
    if (kv[2]) kv[2].textContent = (d.kpis.total ? Math.round(d.kpis.handoff / d.kpis.total * 100) : 0) + '%';
    if (d.trend && d.trend.length) drawTrend(d.trend);
    const dist = d.conclusionDist || {};
    const tot = (dist.pass || 0) + (dist.reject || 0) + (dist.handoff || 0) || 1;
    const lg = document.querySelectorAll('#pageContent .donut-legend .lg');
    if (lg[0] && lg[0].querySelector('b')) lg[0].querySelector('b').textContent = Math.round((dist.pass || 0) / tot * 100) + '%';
    if (lg[1] && lg[1].querySelector('b')) lg[1].querySelector('b').textContent = Math.round((dist.reject || 0) / tot * 100) + '%';
    if (lg[2] && lg[2].querySelector('b')) lg[2].querySelector('b').textContent = Math.round((dist.handoff || 0) / tot * 100) + '%';
    if (d.agentRates) {
      const order = ['ocr','multimodal','entity','validate','rule'];
      const rows = document.querySelectorAll('#pageContent .bar-row');
      order.forEach(function (k, i) {
        const r = d.agentRates.filter(function (a) { return a.key === k; })[0];
        if (!r || !rows[i]) return;
        const val = r.rate == null ? null : Math.round(r.rate);
        const fill = rows[i].querySelector('.bar-fill');
        const v = rows[i].querySelector('.bar-val');
        if (val != null) { if (fill) fill.style.width = val + '%'; if (v) v.textContent = val + '%'; }
      });
    }
    const tasks = await api('/tasks');
    const pending = (tasks || []).filter(function (t) {
      return t.review_status === '待人工复核' || t.review_status === '不通过';
    }).slice(0, 5);
    const cards = document.querySelectorAll('#pageContent .chart-card');
    const top5 = cards[cards.length - 1];
    if (top5) {
      const tb = top5.querySelector('tbody');
      if (tb) {
        tb.innerHTML = '';
        pending.forEach(function (t) {
          const c = (t.confidence || 0);
          const lvl = c < 50 ? '高' : (c < 80 ? '中' : '低');
          const lvlCls = lvl === '高' ? 'badge-danger' : (lvl === '中' ? 'badge-warning' : 'badge-default');
          const tr = document.createElement('tr');
          tr.innerHTML = '<td><span class="badge ' + lvlCls + '"><i class="badge-dot"></i>' + lvl + '</span></td>' +
            '<td>' + esc(t.filename) + '</td>' +
            '<td>' + (lvl === '高' ? '高风险' : (lvl === '中' ? '中风险' : '低风险')) + '</td>' +
            '<td>' + c + '%</td><td>—</td>' +
            '<td><a class="link-action" onclick="openReview(\'' + t.task_no + '\')">复核</a></td>';
          tb.appendChild(tr);
        });
      }
    }
  } catch (e) { console.warn('[联调] dashboard 加载失败（保留静态内容）：', e); }
}

/* ---------- 审核任务列表 ---------- */
async function loadTaskList() {
  try {
    const tasks = await api('/tasks');
    if (!tasks) return;
    const details = await Promise.all(tasks.map(function (t) {
      return api('/tasks/' + encodeURIComponent(t.task_no)).catch(function () { return null; });
    }));
    const tb = document.querySelector('#pageContent .ft-table tbody');
    if (!tb) return;
    tb.innerHTML = '';
    tasks.forEach(function (t, i) {
      const det = details[i];
      const cards = (det && det.result) ? det.result.cards : [];
      const total = cards.length || '—';
      const fail = cards.filter(function (c) { return c.status === 'fail'; }).length;
      const pend = cards.filter(function (c) { return c.status === 'pend'; }).length;
      const product = PRODUCT_MAP[t.task_no] || (t.material_type || '');
      const tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="ft-col-id">' + esc(t.task_no) + '</td>' +
        '<td class="ft-col-name">' + esc(t.filename) + '</td>' +
        '<td>' + esc(t.task_type) + '</td>' +
        '<td>' + esc(t.material_type) + '</td>' +
        '<td class="ft-num">' + total + '</td>' +
        '<td class="ft-num fail">' + (fail || 0) + '</td>' +
        '<td class="ft-num pend">' + (pend || 0) + '</td>' +
        '<td>' + esc(t.creator || '') + '</td>' +
        '<td>设计组·王芳</td>' +
        '<td>张明远</td>' +
        '<td>王建国</td>' +
        '<td>' + esc(product) + '</td>' +
        '<td><span class="badge ' + statusBadge(t.review_status) + '"><i class="badge-dot"></i>' + esc(t.review_status) + '</span></td>' +
        '<td class="ft-col-op">' +
          '<a class="link-action" onclick="openReview(\'' + t.task_no + '\')">查看结果</a>' +
          '<a class="link-action">下载结果</a>' +
          '<a class="link-action">下载源文件</a>' +
        '</td>';
      tb.appendChild(tr);
    });
    const pg = document.querySelector('#pageContent .table-pagination span');
    if (pg) pg.textContent = '共 ' + tasks.length + ' 条记录，第 1/1 页';
  } catch (e) { console.warn('[联调] 任务列表加载失败（保留静态内容）：', e); }
}

/* ---------- 审核详情（核心） ---------- */
function injectDecisionBar() {
  if (document.getElementById('decisionBar')) return;
  const bar = document.createElement('div');
  bar.id = 'decisionBar';
  bar.style.cssText = 'display:flex;gap:8px;align-items:center;margin-left:10px;flex-wrap:wrap;';
  bar.innerHTML =
    '<input id="decisionReason" class="form-input" style="height:30px;width:200px;" placeholder="复核意见（可选）">' +
    '<button class="btn btn-primary-sm" onclick="doDecide(\'pass\')">通过</button>' +
    '<button class="btn btn-primary-sm" style="background:#F5222D;border-color:#F5222D;color:#fff;" onclick="doDecide(\'reject\')">不通过</button>' +
    '<button class="btn" onclick="doDecide(\'handoff\')">转人工</button>' +
    '<button class="btn" onclick="rerunTask()">重新运行</button>';
  const top = document.querySelector('#pageContent .review-topbar');
  if (top) top.appendChild(bar);
}
async function loadReviewDetail() {
  try {
    const t = await api('/tasks/' + encodeURIComponent(currentTaskId || 'P000843'));
    if (!t) return;
    currentTaskId = t.task_no || currentTaskId;
    const title = document.querySelector('#pageContent .review-title');
    if (title) title.textContent = '审核详情 · ' + t.task_no;
    const meta = document.querySelector('#pageContent .review-meta');
    if (meta) meta.textContent = t.filename + ' · ' + t.task_type + ' · ' + t.material_type + ' · ' + (PRODUCT_MAP[t.task_no] || '') + ' · 创建人：' + (t.creator || '');
    const st = document.querySelector('#pageContent .review-topbar .badge');
    if (st) { st.className = 'badge ' + statusBadge(t.review_status); st.innerHTML = '<i class="badge-dot"></i>' + esc(t.review_status); }
    const imgName = document.querySelector('#pageContent .image-filename');
    if (imgName) imgName.textContent = t.filename;
    const cards = (t.result && t.result.cards) || [];
    const conf = (t.result && t.result.confidence != null) ? t.result.confidence : t.confidence;
    const ov = document.querySelector('#pageContent .result-overview .op-val');
    if (ov) ov.innerHTML = cards.length + '<span class="op-total">/' + cards.length + '</span>';
    const ss = document.querySelectorAll('#pageContent .status-summary .ss-num');
    if (ss[0]) ss[0].textContent = cards.filter(function (c) { return c.status === 'pass'; }).length;
    if (ss[1]) ss[1].textContent = cards.filter(function (c) { return c.status === 'fail'; }).length;
    if (ss[2]) ss[2].textContent = cards.filter(function (c) { return c.status === 'pend'; }).length;
    const prog = document.querySelector('#pageContent .progress-fill');
    if (prog) prog.style.width = '100%';
    const confLines = document.querySelectorAll('#pageContent .md-content p');
    for (let i = 0; i < confLines.length; i++) {
      if (confLines[i].textContent.indexOf('当前文本整体置信度') >= 0) {
        const s = confLines[i].querySelector('strong');
        if (s) s.textContent = (conf || 0) + '%';
        break;
      }
    }
    injectDecisionBar();
  } catch (e) { console.warn('[联调] 审核详情加载失败（保留静态内容）：', e); }
}
async function doDecide(action) {
  const reason = (document.getElementById('decisionReason') || {}).value || '';
  try {
    const r = await api('/tasks/' + encodeURIComponent(currentTaskId) + '/decide', { method: 'POST', body: { action: action, reason: reason, reviewer: '王审核' } });
    if (r && r.task) { alert('已提交决策：' + action + '，任务状态 → ' + r.task.review_status); loadReviewDetail(); }
    else if (r && r.error) { alert('提交失败：' + r.error); }
  } catch (e) { alert('提交失败：' + e.message); }
}
async function rerunTask() {
  try {
    const r = await api('/tasks/' + encodeURIComponent(currentTaskId) + '/rerun', { method: 'POST' });
    if (r) { alert('已重新运行 7 智能体审核流水线'); loadReviewDetail(); }
  } catch (e) { alert('重跑失败：' + e.message); }
}

/* ---------- 规则库 ---------- */
async function loadRules() {
  try {
    const rules = await api('/rules');
    if (!rules) return;
    const tb = document.querySelector('#pageContent .data-table tbody');
    if (!tb) return;
    tb.innerHTML = '';
    rules.forEach(function (r, i) {
      const on = r.status === '启用';
      const tr = document.createElement('tr');
      tr.setAttribute('data-id', r.id);
      tr.setAttribute('data-level1', r.level1);
      tr.setAttribute('data-level2', r.level2 || '');
      tr.setAttribute('data-detail', r.detail);
      tr.setAttribute('data-material', r.material_type || '全部类型');
      tr.setAttribute('data-status', on ? 'on' : 'off');
      tr.innerHTML = '<td>' + (i + 1) + '</td><td>' + esc(r.level1) + '</td><td>' + esc(r.level2 || '') + '</td><td>' + esc(r.detail) + '</td><td>' + esc(r.material_type || '全部类型') + '</td>' +
        '<td><span class="badge ' + (on ? 'badge-success' : 'badge-danger') + '">' + (on ? '启用' : '禁用') + '</span></td>' +
        '<td><a class="link-action" onclick="openRuleEdit(this)">编辑</a><a class="link-action" onclick="toggleRuleStatus(this)">' + (on ? '禁用' : '启用') + '</a></td>';
      tb.appendChild(tr);
    });
    const tree0 = document.querySelector('#pageContent .tree-node');
    if (tree0) { const c = tree0.querySelector('.tree-count'); if (c) c.textContent = rules.length + ' 条'; }
    const pg = document.querySelector('#pageContent .table-pagination span');
    if (pg) pg.textContent = '共 ' + rules.length + ' 条（当前显示 ' + rules.length + ' 条）';
  } catch (e) { console.warn('[联调] 规则库加载失败（保留静态内容）：', e); }
}
async function persistRule(tr, data) {
  try {
    if (tr && tr.getAttribute('data-id') && /^\d+$/.test(tr.getAttribute('data-id'))) {
      await api('/rules/' + tr.getAttribute('data-id'), { method: 'PUT', body: data });
    } else {
      await api('/rules', { method: 'POST', body: data });
    }
    loadRules();
  } catch (e) { console.warn('[联调] 规则保存失败：', e); }
}

/* ---------- 知识库 ---------- */

async function deleteKnowledge(id) {
  if (!confirm('确认删除该知识条目？')) return;
  try { await api('/knowledge/' + id, { method: 'DELETE' }); loadKnowledge(); } catch (e) { alert('删除失败：' + e.message); }
}
async function addKnowledge() {
  const title = prompt('知识条目名称：'); if (!title) return;
  const content = prompt('内容：'); if (content == null) return;
  const type = prompt('类型（entity/rule/badcase/goodcase）：', 'rule') || 'rule';
  try {
    await api('/knowledge', { method: 'POST', body: { type: type, category: '营销合规规则', title: title, content: content, source: '人工录入', version: 'V1', compliance_level: 'med', status: '启用' } });
    loadKnowledge();
  } catch (e) { alert('添加失败：' + e.message); }
}

/* ---------- 模型与阈值配置 ---------- */
async function loadModelConfig() {
  try {
    const agents = await api('/config/agents');
    const g = await api('/config/global');
    if (agents) {
      window._agentKeys = agents.map(function (a) { return a.key; });
      const cards = document.querySelectorAll('#pageContent .agent-cfg');
      agents.forEach(function (a, i) {
        const card = cards[i]; if (!card) return;
        const badge = card.querySelector('.badge');
        const on = a.enabled === 1 || a.enabled === true;
        if (badge) { badge.className = 'badge ' + (on ? 'badge-success' : 'badge-danger'); badge.textContent = on ? '启用' : '禁用'; }
        const slider = card.querySelector('.slider');
        const thr = card.querySelector('.thr-val');
        const val = Math.round((a.threshold || 0.8) * 100);
        if (slider) slider.value = val;
        if (thr) thr.textContent = val + '%';
        const sel = card.querySelector('select.form-input');
        if (sel && a.model) {
          for (let o = 0; o < sel.options.length; o++) {
            const txt = sel.options[o].textContent.trim();
            if (a.model.indexOf(txt) >= 0 || txt.indexOf(a.model.slice(0, 6)) >= 0) { sel.selectedIndex = o; break; }
          }
        }
        if (slider) {
          slider.oninput = function () { const f = slider.closest('.form-field'); const v = f && f.querySelector('.thr-val'); if (v) v.textContent = slider.value + '%'; };
          slider.onchange = (function (key) { return async function () { try { await api('/config/agents/' + key, { method: 'PUT', body: { threshold: (+slider.value) / 100 } }); } catch (e) { console.warn('阈值保存失败', e); } }; })(a.key);
        }
      });
    }
    const secSliders = document.querySelectorAll('#pageContent .config-section .slider');
    if (secSliders[0] && g && g.auto_handoff_below != null) {
      secSliders[0].value = Math.round((+g.auto_handoff_below) * 100);
      const sp = secSliders[0].parentElement.querySelector('span');
      if (sp) sp.textContent = Math.round((+g.auto_handoff_below) * 100) + '%';
      secSliders[0].onchange = async function () { try { await api('/config/global', { method: 'PUT', body: { auto_handoff_below: (+secSliders[0].value) / 100 } }); } catch (e) { console.warn('全局阈值保存失败', e); } };
    }
  } catch (e) { console.warn('[联调] 模型配置加载失败（保留静态内容）：', e); }
}
